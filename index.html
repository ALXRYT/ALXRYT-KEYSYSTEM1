<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALXRYT | Space Key System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="space-bg"></div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide">
                <div class="glass-card">
                    <img src="logo.png" class="logo">
                    <h2>ALXRYT HUB</h2>
                    <p>Swipe to getkey</p>
                    <a href="YOUR_DISCORD_LINK" target="_blank" class="btn discord-btn">
                        <i class="fab fa-discord"></i> JOIN DISCORD
                    </a>
                    <div class="swipe-hint">Swipe Left <i class="fas fa-arrow-right"></i></div>
                </div>
            </div>

            <div class="swiper-slide">
                <div class="glass-card">
                    <h2>1</h2>
                    <p>Continue with lootlabs</p>
                    <a href="YOUR_LINKVERTISE_LINK" target="_blank" class="btn ad-btn">LOOTLABS</a>
                </div>
            </div>

            <div class="swiper-slide">
                <div class="glass-card">
                    <h2>2</h2>
                    <p>Continue with shrink.io</p>
                    <a href="YOUR_SHRINKME_LINK" target="_blank" class="btn ad-btn">SHRINKME.IO</a>
                    
                </div>
            </div>

        </div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds2.js"></script> <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
